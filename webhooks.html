<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sublime Webhooks — bradwillhelp.com</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f12;
      --surface:   #13161b;
      --surface2:  #1a1e25;
      --surface3:  #20252e;
      --border:    #2a2f3a;
      --border2:   #343b48;
      --green:     #00c853;
      --green-dim: #00c85322;
      --teal:      #00bfa5;
      --text:      #dde3ee;
      --text-dim:  #7a8499;
      --text-mute: #4a5268;
      --critical:  #ff4444;
      --crit-bg:   #ff444418;
      --high:      #ff9500;
      --high-bg:   #ff950018;
      --medium:    #3d9eff;
      --med-bg:    #3d9eff18;
      --low:       #00c853;
      --low-bg:    #00c85318;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── scanline texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .container { max-width: 920px; margin: 0 auto; }

    /* ── header ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .header-left h1 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .header-left .subtitle {
      font-size: 11px;
      color: var(--text-mute);
      margin-top: 3px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-live  {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid #00c85344;
      animation: pulse-green 2s infinite;
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    .badge-count { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }

    /* ── controls ── */
    .controls { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }

    button {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
    button.danger { color: var(--critical); border-color: #ff444433; }
    button.danger:hover { background: var(--crit-bg); }

    .status-bar {
      font-size: 11px;
      color: var(--text-mute);
      margin-bottom: 1rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── empty state ── */
    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-mute);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: var(--surface);
    }
    .empty .sub { font-size: 11px; margin-top: 8px; color: var(--text-mute); font-family: 'IBM Plex Mono', monospace; }

    /* ── event card ── */
    .event {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .event:hover { border-color: var(--border2); }

    .event-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }
    .event-header:hover { background: var(--surface2); }

    /* severity badge */
    .sev {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
    }
    .sev-critical { background: var(--crit-bg); color: var(--critical); border: 1px solid #ff444433; }
    .sev-high     { background: var(--high-bg);  color: var(--high);     border: 1px solid #ff950033; }
    .sev-medium   { background: var(--med-bg);   color: var(--medium);   border: 1px solid #3d9eff33; }
    .sev-low      { background: var(--low-bg);   color: var(--low);      border: 1px solid #00c85333; }
    .sev-unknown  { background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border); }

    .event-rule {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .event-subject {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      font-style: italic;
    }

    .event-time {
      font-size: 11px;
      color: var(--text-mute);
      white-space: nowrap;
      font-family: 'IBM Plex Mono', monospace;
    }

    .chevron {
      font-size: 10px;
      color: var(--text-mute);
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .chevron.open { transform: rotate(90deg); }

    /* ── expanded body ── */
    .event-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    .event-body.open { display: block; }

    /* section grid */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    @media (max-width: 600px) {
      .detail-grid { grid-template-columns: 1fr; }
    }

    .detail-section {
      background: var(--surface);
      padding: 14px 16px;
    }
    .detail-section.full-width {
      grid-column: 1 / -1;
    }

    .section-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-mute);
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 10px;
    }

    /* KV rows */
    .kv { display: flex; flex-direction: column; gap: 6px; }
    .kv-row { display: flex; gap: 8px; align-items: baseline; }
    .kv-key {
      font-size: 10px;
      color: var(--text-mute);
      font-family: 'IBM Plex Mono', monospace;
      min-width: 72px;
      flex-shrink: 0;
    }
    .kv-val {
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
      font-family: 'IBM Plex Mono', monospace;
    }
    .kv-val.highlight { color: var(--teal); }
    .kv-val.critical  { color: var(--critical); }
    .kv-val.benign    { color: var(--green); }

    /* tags */
    .tag-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface3);
      color: var(--text-dim);
      border: 1px solid var(--border2);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* rules list */
    .rule-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .rule-item:last-child { border-bottom: none; }
    .rule-name { font-size: 12px; color: var(--text); flex: 1; }
    .rule-id   { font-size: 10px; color: var(--text-mute); font-family: 'IBM Plex Mono', monospace; }

    /* links list */
    .link-item {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .link-item:last-child { border-bottom: none; }
    .link-url { color: var(--teal); font-family: 'IBM Plex Mono', monospace; word-break: break-all; }
    .link-meta { color: var(--text-mute); font-size: 10px; margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }

    /* actions */
    .action-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .action-row:last-child { border-bottom: none; }
    .action-name { font-size: 12px; color: var(--text); flex: 1; }
    .action-type { font-size: 10px; color: var(--text-mute); font-family: 'IBM Plex Mono', monospace; }
    .action-status {
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 1px 7px;
      border-radius: 4px;
    }
    .status-in_progress { background: var(--high-bg);  color: var(--high);   border: 1px solid #ff950033; }
    .status-pending     { background: var(--med-bg);   color: var(--medium); border: 1px solid #3d9eff33; }
    .status-complete    { background: var(--low-bg);   color: var(--low);    border: 1px solid #00c85333; }
    .status-failed      { background: var(--crit-bg);  color: var(--critical); border: 1px solid #ff444433; }

    /* raw JSON toggle */
    .raw-toggle {
      font-size: 11px;
      color: var(--text-mute);
      cursor: pointer;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      font-family: 'IBM Plex Mono', monospace;
    }
    .raw-toggle:hover { color: var(--text-dim); background: var(--surface2); }

    .raw-json {
      display: none;
      padding: 0 16px 14px;
      background: var(--surface);
    }
    .raw-json.open { display: block; }

    pre {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.7;
      background: var(--surface2);
      border-radius: 6px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
    }

    /* attack score chip */
    .score-chip {
      display: inline-block;
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .score-malicious    { background: var(--crit-bg);  color: var(--critical); }
    .score-suspicious   { background: var(--high-bg);  color: var(--high); }
    .score-likely_benign{ background: var(--low-bg);   color: var(--low); }
    .score-benign       { background: var(--low-bg);   color: var(--low); }
    .score-unknown      { background: var(--surface3); color: var(--text-dim); }

    /* ── attachments ── */
    .attachment-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .attachment-item:last-child { border-bottom: none; }

    .attachment-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border2);
      flex-shrink: 0;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .attachment-thumb:hover { opacity: 0.85; }

    .attachment-icon {
      width: 72px;
      height: 72px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface3);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .attachment-icon-ext {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .attachment-icon-label {
      font-size: 9px;
      color: var(--text-mute);
      font-family: 'IBM Plex Mono', monospace;
    }

    .attachment-meta { flex: 1; min-width: 0; }
    .attachment-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .attachment-details { display: flex; flex-direction: column; gap: 4px; }
    .attachment-row {
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .attachment-key {
      font-size: 10px;
      color: var(--text-mute);
      font-family: 'IBM Plex Mono', monospace;
      min-width: 52px;
      flex-shrink: 0;
    }
    .attachment-val {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      word-break: break-all;
    }

    /* image lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      border: 1px solid var(--border2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      color: var(--text-dim);
      font-size: 24px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      z-index: 10001;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="header-left">
        <h1>Sublime webhook receiver</h1>
        <div class="subtitle">bradwillhelp.com · na-east-3</div>
      </div>
      <div class="header-right">
        <span class="badge badge-live" id="live-badge">● live</span>
        <span class="badge badge-count" id="count-badge">0 events</span>
      </div>
    </header>

    <div class="controls">
      <button onclick="fetchEvents()">↻ Refresh</button>
      <button class="danger" onclick="clearEvents()">✕ Clear all</button>
    </div>

    <p class="status-bar" id="status">Connecting...</p>

    <div id="feed">
      <div class="empty" id="empty-state">
        No webhook events yet
        <div class="sub">Events will appear here automatically · polling every 10s</div>
      </div>
    </div>

  </div>

  <!-- Lightbox for image attachments -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">✕</span>
    <img id="lightbox-img" src="" alt="Attachment preview" />
  </div>

  <script>
    const WORKER_URL = "https://webhook.bradwillhelp.com";

    let events = [];

    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightbox-img').src = '';
    }

    function sevClass(s) {
      if (!s) return "sev-unknown";
      return { critical: "sev-critical", high: "sev-high", medium: "sev-medium", low: "sev-low" }[s.toLowerCase()] || "sev-unknown";
    }

    function scoreClass(s) {
      if (!s) return "score-unknown";
      return "score-" + s.toLowerCase().replace(/\s+/g, '_');
    }

    function timeAgo(iso) {
      const secs = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (secs < 10)   return "just now";
      if (secs < 60)   return secs + "s ago";
      if (secs < 3600) return Math.floor(secs / 60) + "m ago";
      return Math.floor(secs / 3600) + "h ago";
    }

    function fmtTime(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleDateString() + " " + d.toLocaleTimeString();
    }

    function escHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function parseEvent(ev) {
      const p = ev.payload || {};
      const d = p.data   || {};
      const rules    = d.flagged_rules || [];
      const sevOrder = ["critical", "high", "medium", "low"];
      const severity = rules
        .map(r => r.severity?.toLowerCase())
        .sort((a, b) => sevOrder.indexOf(a) - sevOrder.indexOf(b))[0] || null;
      return {
        severity,
        rules,
        sender:        d.sender?.email?.email || "—",
        senderName:    d.sender?.display_name || "",
        subject:       d.subject?.subject || "—",
        recipient:     d.recipients?.to?.[0]?.email?.email || "—",
        recipientName: d.recipients?.to?.[0]?.display_name || "",
        links:         d.body?.links || [],
        actions:       d.triggered_actions || [],
        attachments:   d.attachments || [],
        attackScore:   d.attack_score_verdict || null,
        messageId:     d.message?.id || null,
        landedInSpam:  d.message?.landed_in_spam ?? null,
        time:          ev.received_at,
        raw:           ev.payload,
      };
    }

    function buildLinkItem(link) {
      const url    = link.href_url?.url || link.display_url?.url || "—";
      const domain = link.href_url?.domain?.domain || "—";
      const root   = link.href_url?.domain?.root_domain || "";
      const parser = link.parser || "";
      const mismatched = link.mismatched ? ' <span style="color:var(--critical)">⚠ mismatched</span>' : '';
      return `<div class="link-item">
        <div class="link-url">${escHtml(url)}${mismatched}</div>
        <div class="link-meta">domain: ${escHtml(domain)}${root && root !== domain ? " · root: " + escHtml(root) : ""} · parser: ${escHtml(parser)}</div>
      </div>`;
    }

    function formatBytes(bytes) {
      if (!bytes) return "—";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function isImageType(contentType, ext) {
      const imgTypes = ["image/jpeg","image/png","image/gif","image/webp","image/bmp"];
      const imgExts  = ["jpg","jpeg","png","gif","webp","bmp"];
      return imgTypes.includes((contentType||"").toLowerCase()) || imgExts.includes((ext||"").toLowerCase());
    }

    function buildAttachmentItem(att, idx) {
      const isImg  = isImageType(att.content_type, att.file_extension);
      const src    = isImg && att.raw ? `data:${att.content_type || 'image/jpeg'};base64,${att.raw}` : null;
      const thumbId = `thumb-${idx}-${Math.random().toString(36).slice(2)}`;

      const thumbHtml = src
        ? `<img class="attachment-thumb" id="${thumbId}" src="${src}" alt="${escHtml(att.file_name || 'attachment')}" onclick="openLightbox(this.src)" title="Click to enlarge" />`
        : `<div class="attachment-icon">
             <span class="attachment-icon-ext">${escHtml(att.file_extension || '?')}</span>
             <span class="attachment-icon-label">${escHtml(att.file_type || 'file')}</span>
           </div>`;

      return `<div class="attachment-item">
        ${thumbHtml}
        <div class="attachment-meta">
          <div class="attachment-name" title="${escHtml(att.file_name || '—')}">${escHtml(att.file_name || '—')}</div>
          <div class="attachment-details">
            <div class="attachment-row">
              <span class="attachment-key">type</span>
              <span class="attachment-val">${escHtml(att.content_type || att.file_type || '—')}</span>
            </div>
            <div class="attachment-row">
              <span class="attachment-key">size</span>
              <span class="attachment-val">${formatBytes(att.size)}</span>
            </div>
            <div class="attachment-row">
              <span class="attachment-key">md5</span>
              <span class="attachment-val">${escHtml(att.md5 || '—')}</span>
            </div>
            <div class="attachment-row">
              <span class="attachment-key">sha256</span>
              <span class="attachment-val" style="font-size:9px">${escHtml(att.sha256 || '—')}</span>
            </div>
            ${att.content_transfer_encoding ? `
            <div class="attachment-row">
              <span class="attachment-key">encoding</span>
              <span class="attachment-val">${escHtml(att.content_transfer_encoding)}</span>
            </div>` : ''}
          </div>
        </div>
      </div>`;
    }

    function buildRuleItem(rule) {
      const sev = rule.severity?.toLowerCase() || "unknown";
      const tags = (rule.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join("");
      return `<div class="rule-item">
        <span class="sev ${sevClass(sev)}">${escHtml(sev)}</span>
        <div style="flex:1">
          <div class="rule-name">${escHtml(rule.name || "Unnamed rule")}</div>
          ${tags ? `<div class="tag-row" style="margin-top:4px">${tags}</div>` : ""}
        </div>
        <div class="rule-id">${escHtml((rule.id || "").substring(0, 8))}…</div>
      </div>`;
    }

    function buildActionRow(action) {
      const statusCls = "action-status status-" + (action.status || "unknown").toLowerCase().replace(/\s+/g, '_');
      return `<div class="action-row">
        <div class="action-name">${escHtml(action.name || "—")}</div>
        <div class="action-type">${escHtml(action.type || "")}</div>
        <span class="${statusCls}">${escHtml(action.status || "—")}</span>
      </div>`;
    }

    function renderCard(ev, i) {
      const p = parseEvent(ev);
      const topRule = p.rules[0]?.name || "Unknown rule";

      const rulesHtml      = p.rules.map(buildRuleItem).join("") || '<div style="color:var(--text-mute);font-size:12px">No rules</div>';
      const linksHtml      = p.links.length
        ? p.links.map(buildLinkItem).join("")
        : '<div style="color:var(--text-mute);font-size:12px">No links detected</div>';
      const actionsHtml    = p.actions.map(buildActionRow).join("") || '<div style="color:var(--text-mute);font-size:12px">None</div>';
      const attachHtml     = p.attachments.length
        ? p.attachments.map((a, i) => buildAttachmentItem(a, i)).join("")
        : '<div style="color:var(--text-mute);font-size:12px">No attachments</div>';

      const scoreChip = p.attackScore
        ? `<span class="score-chip ${scoreClass(p.attackScore)}">${escHtml(p.attackScore)}</span>`
        : "";

      const spamVal = p.landedInSpam === null ? "—"
        : p.landedInSpam ? '<span style="color:var(--critical)">yes</span>'
        : '<span style="color:var(--green)">no</span>';

      const card = document.createElement("div");
      card.className = "event";
      card.innerHTML = `
        <div class="event-header" onclick="toggle(${i})">
          <span class="sev ${sevClass(p.severity)}">${escHtml(p.severity || "unknown")}</span>
          <span class="event-rule">${escHtml(topRule)}${p.rules.length > 1 ? ` <span style="color:var(--text-mute);font-size:11px">+${p.rules.length - 1} more</span>` : ""}</span>
          <span class="event-subject" title="${escHtml(p.subject)}">${escHtml(p.subject)}</span>
          <span class="event-time" data-time="${p.time}">${timeAgo(p.time)}</span>
          <span class="chevron" id="chev-${i}">&#9654;</span>
        </div>

        <div class="event-body" id="body-${i}">
          <div class="detail-grid">

            <!-- Sender -->
            <div class="detail-section">
              <div class="section-label">Sender</div>
              <div class="kv">
                <div class="kv-row"><span class="kv-key">email</span><span class="kv-val highlight">${escHtml(p.sender)}</span></div>
                ${p.senderName ? `<div class="kv-row"><span class="kv-key">name</span><span class="kv-val">${escHtml(p.senderName)}</span></div>` : ""}
              </div>
            </div>

            <!-- Recipient -->
            <div class="detail-section">
              <div class="section-label">Recipient</div>
              <div class="kv">
                <div class="kv-row"><span class="kv-key">email</span><span class="kv-val highlight">${escHtml(p.recipient)}</span></div>
                ${p.recipientName ? `<div class="kv-row"><span class="kv-key">name</span><span class="kv-val">${escHtml(p.recipientName)}</span></div>` : ""}
              </div>
            </div>

            <!-- Message -->
            <div class="detail-section">
              <div class="section-label">Message</div>
              <div class="kv">
                <div class="kv-row"><span class="kv-key">subject</span><span class="kv-val">${escHtml(p.subject)}</span></div>
                <div class="kv-row"><span class="kv-key">received</span><span class="kv-val">${escHtml(fmtTime(p.time))}</span></div>
                <div class="kv-row"><span class="kv-key">in spam</span><span class="kv-val">${spamVal}</span></div>
                ${p.messageId ? `<div class="kv-row"><span class="kv-key">msg id</span><span class="kv-val" style="font-size:10px">${escHtml(p.messageId)}</span></div>` : ""}
              </div>
            </div>

            <!-- Attack Score -->
            <div class="detail-section">
              <div class="section-label">Analysis</div>
              <div class="kv">
                <div class="kv-row"><span class="kv-key">verdict</span><span class="kv-val">${scoreChip || "—"}</span></div>
                <div class="kv-row"><span class="kv-key">rules hit</span><span class="kv-val">${p.rules.length}</span></div>
                <div class="kv-row"><span class="kv-key">links</span><span class="kv-val">${p.links.length}</span></div>
                <div class="kv-row"><span class="kv-key">attachments</span><span class="kv-val">${p.attachments.length}</span></div>
                <div class="kv-row"><span class="kv-key">actions</span><span class="kv-val">${p.actions.length}</span></div>
              </div>
            </div>

            <!-- Flagged Rules -->
            <div class="detail-section full-width">
              <div class="section-label">Flagged Rules</div>
              ${rulesHtml}
            </div>

            <!-- Links -->
            <div class="detail-section full-width">
              <div class="section-label">Links in Message (${p.links.length})</div>
              ${linksHtml}
            </div>

            <!-- Attachments -->
            <div class="detail-section full-width">
              <div class="section-label">Attachments (${p.attachments.length})</div>
              ${attachHtml}
            </div>

            <!-- Triggered Actions -->
            <div class="detail-section full-width">
              <div class="section-label">Triggered Actions</div>
              ${actionsHtml}
            </div>

          </div>

          <!-- Raw JSON toggle -->
          <div class="raw-toggle" onclick="toggleRaw(${i})">
            <span id="raw-chev-${i}">▶</span> raw payload
          </div>
          <div class="raw-json" id="raw-${i}">
            <pre>${escHtml(JSON.stringify(p.raw, null, 2))}</pre>
          </div>
        </div>`;
      return card;
    }

    function render() {
      const feed       = document.getElementById("feed");
      const emptyState = document.getElementById("empty-state");
      const countBadge = document.getElementById("count-badge");

      countBadge.textContent = events.length + (events.length === 1 ? " event" : " events");
      feed.querySelectorAll(".event").forEach(e => e.remove());

      if (events.length === 0) { emptyState.style.display = "block"; return; }
      emptyState.style.display = "none";
      events.forEach((ev, i) => feed.appendChild(renderCard(ev, i)));
    }

    function toggle(i) {
      document.getElementById("body-" + i).classList.toggle("open");
      document.getElementById("chev-" + i).classList.toggle("open");
    }

    function toggleRaw(i) {
      const el   = document.getElementById("raw-" + i);
      const chev = document.getElementById("raw-chev-" + i);
      el.classList.toggle("open");
      chev.textContent = el.classList.contains("open") ? "▼" : "▶";
    }

    async function fetchEvents() {
      const status = document.getElementById("status");
      try {
        const res = await fetch(WORKER_URL);
        if (!res.ok) throw new Error("HTTP " + res.status);
        events = await res.json();
        render();
        status.textContent = "last updated · " + new Date().toLocaleTimeString();
      } catch (err) {
        status.textContent = "error: " + err.message;
        console.error(err);
      }
    }

    async function clearEvents() {
      if (!confirm("Clear all events?")) return;
      try {
        await fetch(WORKER_URL + "?clear=1");
        events = [];
        render();
        document.getElementById("status").textContent = "cleared.";
      } catch (err) {
        alert("Error clearing: " + err.message);
      }
    }

    // Refresh timestamps
    setInterval(() => {
      document.querySelectorAll("[data-time]").forEach(el => {
        el.textContent = timeAgo(el.dataset.time);
      });
    }, 30000);

    // Poll every 10s
    fetchEvents();
    setInterval(fetchEvents, 10000);
  </script>
</body>
</html>
